<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-icon">
        <span class="material-icons">school</span>
      </div>
      <h1 class="login-title">Sistema de Gestión</h1>
      <p class="login-subtitle">Ingresa tus credenciales para continuar</p>
    </div>
    
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <div class="input-wrapper">
          <span class="material-icons input-icon">email</span>
          <input 
            type="email" 
            class="form-input" 
            [(ngModel)]="email" 
            name="email" 
            placeholder="correo@colegio.cl"
            required
          >
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrapper">
          <span class="material-icons input-icon">lock</span>
          <input 
            type="password" 
            class="form-input" 
            [(ngModel)]="password" 
            name="password" 
            placeholder="••••••••"
            required
          >
        </div>
      </div>
      
      @if (error()) {
        <div class="error-message">
          <span class="material-icons">error</span>
          {{ error() }}
        </div>
      }
      
      <button type="submit" class="btn btn-primary login-btn" [disabled]="auth.isLoading()">
        @if (auth.isLoading()) {
          <mat-spinner diameter="20"></mat-spinner>
        } @else {
          <span>Iniciar Sesión</span>
          <span class="material-icons">arrow_forward</span>
        }
      </button>
    </form>
    
    <div class="login-footer" style="position: relative; z-index: 100;">
      <p>¿No tienes una cuenta? <a routerLink="/registro" style="pointer-events: auto;">Regístrate como apoderado</a></p>
      <p class="help-text">¿Necesitas ayuda? Contacta al administrador</p>
    </div>
  </div>
</div>
