name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd Frontend
          npm install

      - name: Build
        run: |
          cd Frontend
          npm run build

      - name: Build Functions Worker
        run: |
          cd Frontend
          npx wrangler pages functions build functions --outdir dist/cloudflare/browser

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/cloudflare/browser --project-name gestionestudiantil