services:
  - type: web
    name: backend-gestion-estudiantil
    env: python
    buildCommand: pip install -r Backend/requirements.txt
    startCommand: gunicorn Backend.wsgi:application --bind 0.0.0.0:$PORT --chdir .
    envVars:
      - key: MONGO_USER
        value: jonaaxsic
      - key: MONGO_PASSWORD
        value: ""  # Configura manualmente en el panel de Render - NO subas tu password real
      - key: MONGO_HOST
        value: main-database.rpaamyh.mongodb.net
      - key: MONGO_DB_NAME
        value: App_estudiantil
      - key: MONGO_PORT
        value: 27017
      - key: SECRET_KEY
        value: "django-insecure-dev-key-change-in-production-123456789"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11"

        