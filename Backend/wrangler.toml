# ===========================================
# wrangler.toml - Cloudflare Worker (Backend API)
# ===========================================

name = "gestion-estudiantil-backend"
main = "src/index.js"
compatibility_date = "2025-04-04"

# Variables de entorno - configurar en Cloudflare Dashboard
# MONGODB_API_URL: URL del MongoDB Atlas Data API
# MONGODB_API_KEY: API Key de MongoDB Atlas
# MONGODB_DB: Nombre de la base de datos (default: App_estudiantil)

[vars]
ENVIRONMENT = "production"

# Rutas personalizadas (opcional - si quieres un dominio personalizado)
# routes = [
#   { pattern = "api.gestionestudiantil.pages.dev/*", zone_name = "gestionestudiantil.pages.dev" }
# ]