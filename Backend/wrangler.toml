# ===========================================
# wrangler.toml - Backend Django en Cloudflare Workers
# ===========================================
# NOTA: Cloudflare Workers tiene soporte limitado para Python/Django
# Para producción, considera usar: Railway, Render, o Fly.io

name = "gestion-estudiantil-backend"
main = "index.py"
compatibility_date = "2025-04-01"
compatibility_flags = ["python_packages"]

[vars]
ENVIRONMENT = "production"

# Base de datos - MongoDB Atlas (usar variables de entorno en producción)
# MONGO_HOST, MONGO_USER, MONGO_PASSWORD, MONGO_DB_NAME

# Rutas de interés
# routes = [
#   { pattern = "api.tudominio.com/*", zone_name = "tudominio.com" }
# ]

# KV Namespace para caché si es necesario
# [[kv_namespaces]]
# binding = "CACHE"
# id = "tu-kv-namespace-id"